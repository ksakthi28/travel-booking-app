<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Premium Travel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <h2 class="text-center mb-4">Create Account</h2>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="name@example.com" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" />
    </div>

    <button id="sendOtpBtn" class="btn">Send OTP via Email</button>

    <div id="otpSection" style="display:none;" class="mt-3">
      <div class="form-group">
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" />
      </div>
      <button id="verifyOtpBtn" class="btn btn-secondary">Verify & Register</button>
    </div>

    <p id="message" class="message"></p>

    <div class="mt-4 text-center">
      <p style="color:var(--text-muted); font-size:0.9rem;">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    protectServerAccess();
  </script>
  <script src="register.js"></script>

</body>
</html>
