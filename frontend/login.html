<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Premium Travel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <h2 class="text-center mb-4">Welcome Back</h2>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="name@example.com" />
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button id="passwordLoginBtn" class="btn">Login with Password</button>
    <button id="otpLoginBtn" class="btn btn-secondary">Login with OTP</button>
    <a href="booking.html" class="btn" style="background-color: transparent; color: var(--text-muted); border: none; text-decoration: underline; margin-top: 0.5rem; box-shadow: none;">Skip to Booking</a>

    <div id="otpSection" style="display:none;" class="mt-3">
      <div class="form-group">
        <label for="otp">Enter 6-digit OTP</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" />
      </div>
      <button id="verifyOtpBtn" class="btn btn-secondary">Verify OTP</button>
    </div>

    <p id="message" class="message"></p>

    <div class="mt-3 text-center">
      <a href="forgot-password.html" class="mb-1" style="display:block;">Forgot Password?</a>
      <p style="color:var(--text-muted); font-size:0.9rem;">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    protectServerAccess();
  </script>
  <script src="login.js"></script>

</body>
</html>
