<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Premium Travel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <h2 class="text-center mb-2">Reset Password</h2>
    <p class="text-center mb-4" style="color:var(--text-muted); font-size:0.95rem;">Enter your email to receive a reset code.</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="name@example.com" />
    </div>

    <button id="sendOtpBtn" class="btn">Send Reset Code</button>

    <div id="otpSection" style="display:none;" class="mt-3">
      <div class="form-group">
        <label for="otp">Enter 6-digit Code</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" />
      </div>
      
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Min. 6 characters" />
      </div>

      <button id="resetBtn" class="btn btn-secondary">Set New Password</button>
    </div>

    <p id="message" class="message"></p>

    <div class="mt-4 text-center">
      <a href="login.html" style="font-size:0.9rem;">← Back to Login</a>
    </div>
  </div>

  <script src="forgot-password.js"></script>

</body>
</html>
