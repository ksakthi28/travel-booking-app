<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Premium Travel</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .my-bookings-container {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }
    
    .page-header h2 {
      margin: 0;
      font-size: 2.2rem;
      color: var(--primary-color);
    }

    /* CSS Grid setup for Booking Cards */
    .bookings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
    }

    /* Upgraded Booking Card */
    .booking-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
    }

    .booking-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.1);
      border-color: rgba(169, 35, 114, 0.2); /* Soft primary color border */
    }

    /* Status Header Strip */
    .card-strip {
      height: 6px;
      width: 100%;
    }
    .strip-pending { background-color: var(--warning); }
    .strip-approved { background-color: var(--success); }
    .strip-cancelled { background-color: var(--danger); }

    .card-header {
      padding: 1.5rem 1.5rem 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border-color);
    }

    .card-header h3 {
      font-size: 1.4rem;
      margin: 0 0 0.25rem 0;
      color: var(--text-dark);
      font-weight: 700;
      line-height: 1.2;
    }

    .card-header .journey {
      font-size: 0.9rem;
      color: var(--primary-color);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-body {
      padding: 1.5rem;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .info-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .info-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .info-value {
      font-size: 1rem;
      color: var(--text-dark);
      font-weight: 500;
    }

    .card-footer {
      padding: 1.25rem 1.5rem;
      background-color: #fafafa;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cancel-btn {
      color: var(--danger);
      background: none;
      border: none;
      font-weight: 600;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.5rem;
      margin: -0.5rem; /* increase hit area */
      transition: opacity 0.2s;
    }
    .cancel-btn:hover { opacity: 0.7; text-decoration: underline; }
    .cancel-btn:disabled { color: var(--text-muted); cursor: not-allowed; text-decoration: none; }

  </style>
</head>
<body>

<nav class="navbar">
  <ul>
    <li><a href="booking.html">Book a Car</a></li>
    <li><a href="my-bookings.html" class="active">My Bookings</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li><a href="settings.html">Settings</a></li>
    <li><a href="login.html" class="nav-logout" onclick="logout()">Logout</a></li>
  </ul>
</nav>

<div class="my-bookings-container">
  
  <div class="page-header">
    <h2>Your Trips ✈️</h2>
    <a href="booking.html" class="btn" style="width: auto; margin: 0;">+ New Booking</a>
  </div>

  <div id="bookingsContainer" class="bookings-grid">
    <!-- Cards will be injected here via JS -->
    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem;">
      <p style="color: var(--text-muted); font-size: 1.2rem;">Loading your trips...</p>
    </div>
  </div>

</div>

<script src="auth.js"></script>
<script>
  protectPage();
</script>
<script src="my-bookings.js"></script>

</body>
</html>
