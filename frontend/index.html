<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Travel Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--primary-color) 0%, #4a0d30 100%); margin: 0;">

  <div class="auth-container" style="margin: 0; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
    
    <div style="font-size: 3rem; margin-bottom: 1rem;">🚗</div>
    <h1 style="color: var(--primary-color); margin-bottom: 0.5rem; font-size: 2rem;">Premium Travel</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Book your luxury intercity travel seamlessly.</p>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <a href="javascript:openAuthModal('login')" class="btn" style="margin: 0;">Login securely</a>
      <a href="javascript:openAuthModal('register')" class="btn btn-secondary" style="margin: 0;">Create an account</a>
    </div>

  </div>

  <script src="auth.js"></script>
  <script src="auth-modal.js"></script>
  <script>
    protectServerAccess(); // Auto-redirect logged in users to booking.html
  </script>
</body>
</html>
