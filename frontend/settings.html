<div class="container mt-4">
  <div class="card" style="max-width: 500px; margin: 0 auto;">
    
    <h2 class="mb-3">Security Settings</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Update your password to keep your account secure.</p>
    
    <div class="form-group">
      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" placeholder="Enter current password" />
    </div>
    
    <div class="form-group mb-4">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="Min. 6 characters" />
    </div>

    <button id="changePasswordBtn" class="btn">Update Password</button>

    <p id="message" class="message mt-3"></p>

  </div>
</div>
